name: Generate Stats Images

on:
  push:
    branches:
      - master
  schedule:
    - cron: "25 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Determine commit identity
      id: identity
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        # Only borrow the personal identity when it actually helps the streak,
        # i.e. no contribution has landed on the account yet today. If the
        # streak is already covered, commit as the bot so the profile doesn't
        # fill up with commits that weren't really "worked on" that day.
        # Use IST day boundaries (not UTC) so the window matches the same
        # calendar day the cron schedule is tuned for.
        IST_DATE="$(TZ=Asia/Kolkata date +%Y-%m-%d)"
        FROM="$(date -u -d "${IST_DATE} 00:00:00 +0530" +%Y-%m-%dT%H:%M:%SZ)"
        TO="$(date -u -d "${IST_DATE} 23:59:59 +0530" +%Y-%m-%dT%H:%M:%SZ)"
        COUNT=$(gh api graphql -f query='
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar { totalContributions }
              }
            }
          }' -f login="faisal-kursheedali" -f from="$FROM" -f to="$TO" \
          --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
        echo "Contributions today so far: $COUNT"

        if [ "$COUNT" -gt 0 ]; then
          echo "name=github-actions[bot]" >> "$GITHUB_OUTPUT"
          echo "email=41898282+github-actions[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"
        else
          echo "name=${{ vars.GIT_USER_NAME }}" >> "$GITHUB_OUTPUT"
          echo "email=${{ vars.GIT_USER_EMAIL }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout history branch
      run: |
        git config --global user.name "${{ steps.identity.outputs.name }}"
        git config --global user.email "${{ steps.identity.outputs.email }}"
        # Push generated files to the generated branch
        git pull
        git checkout generated || git checkout -b generated

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Self-host github-readme-stats (for the rank/grade circle)
      run: |
        git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/grs
        cd /tmp/grs
        npm i --omit=dev --ignore-scripts
        npm i express --ignore-scripts
        PAT_1="${{ secrets.ACCESS_TOKEN }}" node express.js &
        for i in $(seq 1 30); do
          curl -sf "http://localhost:9000/api?username=faisal-kursheedali" -o /dev/null && break
          sleep 1
        done
      env:
        PAT_1: ${{ secrets.ACCESS_TOKEN }}

    - name: Generate stats + languages cards (grade, icon, and dynamic variants)
      run: |
        curl -sf "http://localhost:9000/api?username=faisal-kursheedali&show_icons=true&hide_border=true&theme=tokyonight&rank_icon=default&include_all_commits=true&count_private=true" -o stats-dark.svg
        curl -sf "http://localhost:9000/api?username=faisal-kursheedali&show_icons=true&hide_border=true&theme=default&rank_icon=default&include_all_commits=true&count_private=true" -o stats-light.svg
        curl -sf "http://localhost:9000/api?username=faisal-kursheedali&show_icons=true&hide_border=true&theme=tokyonight&rank_icon=github&include_all_commits=true&count_private=true" -o stats-dark-icon.svg
        curl -sf "http://localhost:9000/api?username=faisal-kursheedali&show_icons=true&hide_border=true&theme=default&rank_icon=github&include_all_commits=true&count_private=true" -o stats-light-icon.svg

        RANK=$(grep -oE 'Rank: [A-Z+-]+' stats-dark.svg | head -1 | sed 's/Rank: //')
        echo "Detected rank: $RANK"
        case "$RANK" in
          S|A+|A|A-|B+|B) cp stats-dark.svg stats-dark-dynamic.svg; cp stats-light.svg stats-light-dynamic.svg ;;
          *) cp stats-dark-icon.svg stats-dark-dynamic.svg; cp stats-light-icon.svg stats-light-dynamic.svg ;;
        esac

        curl -sf "http://localhost:9000/api/top-langs/?username=faisal-kursheedali&layout=compact&hide_border=true&theme=tokyonight" -o languages-dark.svg
        curl -sf "http://localhost:9000/api/top-langs/?username=faisal-kursheedali&layout=compact&hide_border=true&theme=default" -o languages-light.svg

    - name: Generate streak stats card (dark)
      uses: DenverCoder1/github-readme-streak-stats@v1.7.0
      with:
        path: "streak-dark.svg"
        options: "user=faisal-kursheedali&theme=tokyonight&hide_border=true"
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: Generate streak stats card (light)
      uses: DenverCoder1/github-readme-streak-stats@v1.7.0
      with:
        path: "streak-light.svg"
        options: "user=faisal-kursheedali&theme=default&hide_border=true"
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: Commit to the repo
      run: |
        git add .
        # Force the build to succeed, even if no files were changed
        git commit -m 'Update generated files' || true
        git push --set-upstream origin generated
